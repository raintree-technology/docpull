schema_version: 2
name: live-neutral-crawl
version: 1.0.0
description: Frozen bounded documentation-site crawl benchmark. Every system receives
  the same start URL, path prefixes, eight-page limit, depth-one bound, and gold checks.
  Development and test domains are disjoint.
cases:
- id: crawl.python-asyncio
  input:
    case_id: crawl.python-asyncio
    lane: crawl
    url: https://docs.python.org/3/library/asyncio.html
    include_path_prefixes:
    - /3/library/asyncio
    max_pages: 8
    max_depth: 1
    timeout_seconds: 150
  expected:
    minimum_records: 5
    minimum_content_chars: 20000
    required_terms:
    - Asynchronous I/O
    - Coroutines and Tasks
    - Synchronization Primitives
    required_urls:
    - https://docs.python.org/3/library/asyncio.html
    - https://docs.python.org/3/library/asyncio-task.html
    - https://docs.python.org/3/library/asyncio-sync.html
    allowed_domains:
    - docs.python.org
    lane: crawl
    maximum_duplicate_rate: 1.0
  metadata:
    description: Bounded crawl of the Python asyncio reference subtree.
    split: dev
    family: language-reference-crawl
    live: true
    tags:
    - documentation
    - python
    - path-filter
    reference_checked_at: '2026-07-14'
    rights:
      redistribution: allowed_with_conditions
      source: https://docs.python.org/3/license.html
      notes: Publish scores and hashes only; do not commit fetched bodies.
    product_area: legacy-v1-migrated
    critical: false
    reference_expires_at: '2026-10-12'
