schema_version: 2
name: live-neutral-extract
version: 1.0.0
description: Neutral fixed-URL extraction benchmark spanning technical documentation,
  standards, raw text, long-form pages, PDFs, modern web pages, and one explicitly
  separated managed-access challenge. Gold terms were manually checked against first-party
  sources on 2026-07-14. Dev and test domains do not overlap.
cases:
- id: dev.docs.python-control-flow
  input:
    case_id: dev.docs.python-control-flow
    lane: extract
    url: https://docs.python.org/3.13/tutorial/controlflow.html
    include_domains:
    - docs.python.org
    timeout_seconds: 90
  expected:
    minimum_records: 1
    maximum_long_token_rate: 0.01
    minimum_content_chars: 8000
    required_terms:
    - More Control Flow Tools
    - arithmetic progressions
    - match Statements
    allowed_domains:
    - docs.python.org
    lane: extract
  metadata:
    comparison_scope: core
    description: Versioned Sphinx tutorial page with code and nested sections.
    split: dev
    family: technical-docs
    live: true
    tags:
    - html
    - sphinx
    - code
    reference_checked_at: '2026-07-14'
    rights:
      redistribution: allowed_with_conditions
      source: Python documentation under the PSF License Agreement.
    product_area: legacy-v1-migrated
    critical: false
    reference_expires_at: '2026-10-12'
