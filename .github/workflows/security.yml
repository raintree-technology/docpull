name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        # Use the MIT-licensed gitleaks CLI rather than gitleaks-action@v2,
        # which requires a paid GITLEAKS_LICENSE secret for organization repos.
        # `detect` scans full git history (fetch-depth: 0) and exits non-zero
        # on any finding; --redact keeps secret values out of the logs.
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9 \
            detect --source=/repo --redact --no-banner

  python-security:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Audit Python dependencies
        run: python -m pip_audit

      - name: Run Bandit
        run: python -m bandit -q -c pyproject.toml -r src scripts

      - name: Run Python security regression tests
        run: PYTHONPATH=src python -m pytest -q tests/test_security_hardening.py tests/test_discovery.py tests/test_integration.py

  mcp-security:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: mcp
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.11"

      - name: Install MCP dependencies
        run: bun install --frozen-lockfile

      - name: Audit MCP dependencies
        run: bun audit

      - name: Run MCP tests
        run: bun test

      - name: Typecheck MCP
        run: bun run typecheck
