name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        # Use the MIT-licensed gitleaks CLI rather than gitleaks-action@v2,
        # which requires a paid GITLEAKS_LICENSE secret for organization repos.
        # `detect` scans full git history (fetch-depth: 0) and exits non-zero
        # on any finding; --redact keeps secret values out of the logs.
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9 \
            detect --source=/repo --redact --no-banner

  python-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: ./.github/actions/setup-python-docpull
        with:
          python-version: "3.11"
          dependency-groups: all,dev

      - name: Run Python security regression tests
        run: make python-security

  mcp-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.11"

      - name: Install MCP dependencies
        run: bun install --frozen-lockfile

      - name: Audit MCP dependencies
        run: bun audit

      - name: Run MCP tests
        run: bun test

      - name: Typecheck MCP
        run: bun run typecheck

  web-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Audit web dependencies
        run: npm audit --omit=dev

      - name: Typecheck web app
        run: npm run typecheck

      - name: Build web app
        run: npm run build
