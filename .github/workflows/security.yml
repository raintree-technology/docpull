name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Audit Python dependencies
        run: pip-audit

      - name: Run Bandit
        run: bandit -q -c pyproject.toml -r src

      - name: Run Python security regression tests
        run: PYTHONPATH=src pytest -q tests/test_security_hardening.py tests/test_discovery.py tests/test_integration.py

  mcp-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install MCP dependencies
        run: bun install --frozen-lockfile

      - name: Audit MCP dependencies
        run: bun audit

      - name: Run MCP tests
        run: bun test

      - name: Typecheck MCP
        run: bun run typecheck

  web-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Audit web dependencies
        run: npm audit --omit=dev

      - name: Typecheck web app
        run: npm run typecheck

      - name: Build web app
        run: npm run build
