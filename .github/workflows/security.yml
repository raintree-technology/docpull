name: Security

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MISE_LOCKED: "1"
  UV_VERSION: "0.11.6"

jobs:
  secret-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true
      - name: Run Gitleaks
        # Use the MIT-licensed gitleaks CLI rather than gitleaks-action@v2,
        # which requires a paid GITLEAKS_LICENSE secret for organization repos.
        # `detect` scans full git history (fetch-depth: 0) and exits non-zero
        # on any finding; --redact keeps secret values out of the logs.
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9 \
            detect --source=/repo --redact --no-banner

  python-security:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true
      - name: Install uv
        run: python -m pip install "uv==$UV_VERSION"

      - name: Sync Python dependencies
        run: uv sync --locked --extra dev

      - name: Audit Python dependencies
        run: uv run --locked python -m pip_audit

      - name: Run Bandit
        run: uv run --locked python -m bandit -q -c pyproject.toml -r src scripts

      - name: Run Python security regression tests
        run: uv run --locked python -m pytest -q tests/test_security_hardening.py tests/test_discovery.py tests/test_integration.py

  mcp-security:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mcp
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true
      - name: Install MCP dependencies
        run: mise run setup

      - name: Audit MCP dependencies
        run: bun audit

      - name: Run MCP tests
        run: bun test

      - name: Typecheck MCP
        run: bun run typecheck
