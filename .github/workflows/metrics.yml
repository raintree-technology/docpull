name: Update metrics

# Refreshes METRICS.md and the README downloads chart from PyPI + GitHub APIs.
#
# Signals:
#   - PyPI downloads (24h / 7d / 30d) via pypistats.org JSON API.
#   - PyPI downloads chart via pepy.tech JSON API.
#   - GitHub repo metadata (stars, forks, watchers, open issues/PRs).
#   - GitHub traffic (clones, views, referrers, paths) — last 14 days.
#
# Plugin install proxy: `/plugin marketplace add raintree-technology/docpull`
# is a git clone under the hood, so daily clone counts approximate
# plugin installs.
#
# Why a workflow instead of an external dashboard:
#   - Single source of truth committed in-repo (no external service to babysit).
#   - History via `git log METRICS.md` if you ever want trend analysis.
#   - Free; uses pre-installed gh CLI + stdlib Python on ubuntu-latest.
#
# Token: traffic endpoints (clones, views, referrers, paths) require
# `Administration: read` permission, which the default GITHUB_TOKEN does
# NOT grant. Public metrics (stars, downloads, issues/PRs) work without
# it. To populate traffic data, create a fine-grained PAT scoped to this
# repo with Administration: read + Metadata: read, save as repo secret
# `METRICS_TOKEN`. The workflow falls back to GITHUB_TOKEN if absent.

on:
  schedule:
    # 09:12 UTC daily (off-hour to dodge top-of-hour Actions spikes).
    - cron: "12 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Avoid overlapping runs piling up if a previous run is still committing.
concurrency:
  group: metrics-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Refresh metrics artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          if [ -n "${METRICS_TOKEN:-}" ] && GH_TOKEN="$METRICS_TOKEN" gh api "repos/${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            export GH_TOKEN="$METRICS_TOKEN"
          else
            if [ -n "${METRICS_TOKEN:-}" ]; then
              echo "::warning::METRICS_TOKEN is present but failed GitHub API validation; falling back to GITHUB_TOKEN."
            fi
            export GH_TOKEN="$GITHUB_TOKEN"
          fi
          python .github/scripts/update_metrics.py

      - name: Open metrics refresh PR
        id: metrics-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        continue-on-error: true
        with:
          add-paths: |
            METRICS.md
            docs/downloads-history.svg
          branch: automation/metrics-refresh
          delete-branch: true
          commit-message: "chore(metrics): refresh metrics"
          title: "chore(metrics): refresh metrics"
          body: "Automated METRICS.md refresh from the scheduled metrics workflow."

      - name: Report PR creation limitation
        if: steps.metrics-pr.outcome == 'failure'
        run: |
          echo "::warning::Metrics refreshed, but PR creation failed. Enable Actions-created pull requests in repository settings or create a PR from automation/metrics-refresh manually."
          {
            echo "### Metrics refresh"
            echo
            echo "METRICS.md was refreshed, but the pull request step failed. Enable Actions-created pull requests in repository settings or open a PR from automation/metrics-refresh manually."
          } >> "$GITHUB_STEP_SUMMARY"
