name: Update metrics

env:
  MISE_LOCKED: "1"

# Refreshes METRICS.md and the README downloads chart from PyPI + GitHub APIs.
#
# Signals:
#   - PyPI downloads (24h / 7d / 30d) via pypistats.org JSON API.
#   - PyPI downloads chart via pepy.tech JSON API.
#   - GitHub repo metadata (stars, forks, watchers, open issues/PRs).
#   - GitHub traffic (clones, views, referrers, paths) — last 14 days.
#
# Plugin install proxy: `/plugin marketplace add raintree-technology/docpull`
# is a git clone under the hood. Manual clone-count refreshes are enough for
# trend tracking while the external metrics APIs are unreliable.
#
# Why a workflow instead of an external dashboard:
#   - Single source of truth committed in-repo (no external service to babysit).
#   - History via `git log METRICS.md` if you ever want trend analysis.
#   - Free; uses pre-installed gh CLI + stdlib Python on ubuntu-24.04.
#
# Token: traffic endpoints (clones, views, referrers, paths) require
# `Administration: read` permission, which the default GITHUB_TOKEN does
# NOT grant. Public metrics (stars, downloads, issues/PRs) work without
# it. To populate traffic data, create a fine-grained PAT scoped to this
# repo with Administration: read + Metadata: read, save as repo secret
# `METRICS_TOKEN`. The workflow falls back to GITHUB_TOKEN if absent.

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

# Avoid overlapping runs piling up if a previous run is still committing.
concurrency:
  group: metrics-update
  cancel-in-progress: false

jobs:
  update:
    # This job has contents:write and receives METRICS_TOKEN; manual runs must
    # not execute code from an arbitrary dispatch ref.
    if: >-
      github.event_name == 'schedule' ||
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true
      - name: Refresh metrics artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          metrics_token="${METRICS_TOKEN:-}"
          use_metrics_token=false
          if [ -n "$metrics_token" ]; then
            printf -v GH_TOKEN '%s' "$metrics_token"
            export GH_TOKEN
            if gh api "repos/${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              use_metrics_token=true
            fi
          fi

          if [ "$use_metrics_token" != true ]; then
            if [ -n "$metrics_token" ]; then
              echo "::warning::METRICS_TOKEN is present but failed GitHub API validation; falling back to GITHUB_TOKEN."
            fi
            printf -v GH_TOKEN '%s' "$GITHUB_TOKEN"
            export GH_TOKEN
          fi
          unset metrics_token use_metrics_token
          python .github/scripts/update_metrics.py

      - name: Check generated metrics freshness
        run: python .github/scripts/check_metrics_fresh.py

      - name: Open metrics refresh pull request
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          GIT_AUTH_TOKEN: ${{ github.token }}
          METRICS_BRANCH: automation/metrics-refresh
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add METRICS.md docs/cumulative-downloads-history.svg
          if git diff --cached --quiet; then
            echo "No metrics changes to publish."
            exit 0
          fi

          git checkout -B "$METRICS_BRANCH"
          git commit -m "chore(metrics): refresh metrics"

          git fetch origin "refs/heads/${METRICS_BRANCH}:refs/remotes/origin/${METRICS_BRANCH}" || true
          git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer ${GIT_AUTH_TOKEN}" \
            push --force-with-lease origin "HEAD:${METRICS_BRANCH}"

          body_file="$(mktemp)"
          cat > "$body_file" <<'EOF'
          Refreshes `METRICS.md` and the committed download chart from the scheduled metrics workflow.

          This workflow opens a pull request because protected `main` requires changes to pass review and status checks.
          EOF

          pr_number="$(gh pr list \
            --head "$METRICS_BRANCH" \
            --base "$DEFAULT_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --title "chore(metrics): refresh metrics" \
              --body-file "$body_file"
          else
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$METRICS_BRANCH" \
              --title "chore(metrics): refresh metrics" \
              --body-file "$body_file"
          fi

          for workflow in ci.yml security.yml codeql.yml; do
            gh workflow run "$workflow" --ref "$METRICS_BRANCH"
          done
