name: Publish to PyPI

# Publishes to PyPI using trusted publishing (OIDC). No secrets needed on
# the repo once the Trusted Publisher is configured on pypi.org.
#
# One-time PyPI setup: https://pypi.org/manage/account/publishing/
#   - Project name:    docpull
#   - Owner:           raintree-technology
#   - Repository name: docpull
#   - Workflow name:   publish.yml
#   - Environment:     pypi
#
# Trigger: pushing a `vX.Y.Z` tag, or manual dispatch from `main`.
# Tag/input version must match pyproject.toml.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, matching pyproject.toml"
        required: true
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Read pyproject.toml version (and verify tag match on tag push)
        id: meta
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -e
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "pyproject=$PROJECT_VERSION"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            echo "tag=$TAG"
            if [ "$TAG" != "$PROJECT_VERSION" ]; then
              echo "::error::Tag $TAG does not match pyproject.toml version $PROJECT_VERSION"
              exit 1
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF_NAME}" != "main" ]; then
              echo "::error::Manual publish must run from main, got ${GITHUB_REF_NAME}"
              exit 1
            fi
            if [ "$REQUESTED_VERSION" != "$PROJECT_VERSION" ]; then
              echo "::error::Requested version $REQUESTED_VERSION does not match pyproject.toml version $PROJECT_VERSION"
              exit 1
            fi
          else
            echo "::error::Publish workflow only runs from vX.Y.Z tags or manual main dispatch"
            exit 1
          fi
          echo "version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install release build dependencies
        run: |
          # Pinned (see requirements-release.txt) so compromised *latest*
          # release tooling cannot be auto-pulled into the wheel-building job.
          python -m pip install -r requirements-release.txt

      - name: Build distributions
        run: python -m build --no-isolation

      - name: Verify wheel and sdist
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  release-gates:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.11"

      - name: Install release gate dependencies
        run: |
          python -m pip install -r requirements-release.txt
          pip install --no-build-isolation -e ".[all,dev]"

      - name: Check generated release metadata
        run: python scripts/sync_release_metadata.py --check

      - name: Run Bandit
        run: python -m bandit -q -c pyproject.toml -r src scripts

      - name: Run A+ real-feature smoke
        run: |
          python scripts/real_feature_smoke.py \
            --json \
            --full-mcp \
            --strict-ci \
            --auth-matrix \
            --monitor-soak-minutes 10 \
            --base-dir release-readiness/real-feature-smoke

      - name: Run A+ release scorecard
        run: |
          python scripts/release_a_plus_check.py \
            --strict \
            --output-dir release-readiness \
            --smoke-report release-readiness/real-feature-smoke/real_feature_smoke.report.json

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: dist/

      - name: Smoke install built wheel
        run: |
          python -m venv .release-smoke
          .release-smoke/bin/python -m pip install --upgrade pip
          .release-smoke/bin/python -m pip install dist/*.whl
          .release-smoke/bin/docpull --version
          .release-smoke/bin/python -c "import docpull; print(docpull.__version__)"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: release-readiness
          path: release-readiness/
          if-no-files-found: warn
          retention-days: 14

  publish:
    needs: [build, release-gates]
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/docpull/
    permissions:
      contents: write  # Required to create/update the GitHub Release after publish
      id-token: write  # Required for OIDC / trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          # No password: trusted publishing via OIDC

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
        if: github.event_name == 'push' && github.ref_type == 'tag'

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          RELEASE_TITLE="docpull ${VERSION}"
          MINOR_VERSION="${VERSION%.*}"
          NOTES_FILE="docs/release-post-v${MINOR_VERSION}.md"

          if gh release view "$TAG" >/dev/null 2>&1; then
            if [ -f "$NOTES_FILE" ]; then
              gh release edit "$TAG" --title "$RELEASE_TITLE" --latest --notes-file "$NOTES_FILE"
            else
              gh release edit "$TAG" --title "$RELEASE_TITLE" --latest
            fi
          elif [ -f "$NOTES_FILE" ]; then
            gh release create "$TAG" --title "$RELEASE_TITLE" --verify-tag --latest --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --title "$RELEASE_TITLE" --verify-tag --latest --generate-notes
          fi
