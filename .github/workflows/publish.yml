name: Publish to PyPI

# Publishes to PyPI using trusted publishing (OIDC). No secrets needed on
# the repo once the Trusted Publisher is configured on pypi.org.
#
# One-time PyPI setup: https://pypi.org/manage/account/publishing/
#   - Project name:    docpull
#   - Owner:           raintree-technology
#   - Repository name: docpull
#   - Workflow name:   publish.yml
#   - Environment:     pypi
#
# Trigger: pushing a `vX.Y.Z` tag. Tag must match pyproject.toml version.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-docpull
        with:
          python-version: "3.11"
          dependency-groups: all,dev

      - name: Read pyproject.toml version and verify tag match
        id: meta
        run: |
          set -e
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "pyproject=$PROJECT_VERSION"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            echo "tag=$TAG"
            if [ "$TAG" != "$PROJECT_VERSION" ]; then
              echo "::error::Tag $TAG does not match pyproject.toml version $PROJECT_VERSION"
              exit 1
            fi
          else
            echo "::error::Publish workflow only runs from vX.Y.Z tags"
            exit 1
          fi
          echo "version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tagged commit is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Release tags must point to a commit reachable from origin/main"
            exit 1
          fi

      - name: Install pinned release tooling
        run: |
          # Pinned (see requirements-release.txt) so a compromised *latest* release
          # of pip/build/twine cannot be auto-pulled into the wheel-building job.
          python -m pip install -r requirements-release.txt

      - name: Run release gates
        run: make release-gates

      - name: Build distributions
        run: |
          python -m build

      - name: Verify wheel and sdist
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/docpull/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write  # Required for OIDC / trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
          # No password: trusted publishing via OIDC
