name: Benchmark

# 10,000-page end-to-end performance benchmark. Runs weekly and on-demand.
# Numbers are surfaced in the workflow summary so regressions
# are caught early; the test itself fails CI if peak RSS exceeds 200 MB
# or if the injected duplicate fraction isn't detected.

on:
  schedule:
    # 04:17 UTC weekly Wednesday — enough signal without daily Actions spend.
    - cron: "17 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  MISE_LOCKED: "1"
  UV_VERSION: "0.11.6"

jobs:
  benchmark:
    if: github.event_name != 'schedule' || github.event.schedule == '17 4 * * 3'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true
      - name: Install uv
        run: python -m pip install "uv==$UV_VERSION"

      - name: Sync dependencies
        run: uv sync --locked --extra dev

      - name: Run 10k-page benchmark
        env:
          DOCPULL_BENCHMARK_10K: "1"
        run: |
          uv run --locked python -m pytest -v -s tests/benchmarks/test_10k_pages.py \
            | tee benchmark.log

      - name: Surface report in summary
        if: always()
        run: |
          echo "## docpull 10k-page benchmark" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          grep "DOCPULL_10K_BENCHMARK_REPORT=" benchmark.log \
            | sed 's/.*DOCPULL_10K_BENCHMARK_REPORT=//' \
            | python -m json.tool \
            >> "$GITHUB_STEP_SUMMARY" || echo "(no report line found)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-log
          path: benchmark.log
          retention-days: 7

  contract-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true
      - name: Install uv
        run: python -m pip install "uv==$UV_VERSION"

      - name: Sync dependencies
        run: uv sync --locked --extra dev

      - name: Run public contract smoke tests
        run: |
          uv run --locked python -m pytest -q \
            tests/test_surface_contract.py \
            tests/test_public_feature_smoke.py \
            tests/test_output_contract.py \
            tests/test_typed_knowledge_packs.py
