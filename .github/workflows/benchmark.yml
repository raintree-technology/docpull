name: Benchmark

# 10,000-page end-to-end performance benchmark. Runs nightly on main and
# on-demand. Numbers are surfaced in the workflow summary so regressions
# are caught early; the test itself fails CI if peak RSS exceeds 200 MB
# or if the injected duplicate fraction isn't detected.

on:
  schedule:
    # 04:17 UTC daily — slightly off the hour to avoid runner contention.
    - cron: "17 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      # Re-run on docpull implementation, benchmark harness, or packaging
      # changes that can shift perf or memory characteristics.
      - "src/docpull/**"
      - "tests/benchmarks/**"
      - "pyproject.toml"
      - ".github/workflows/benchmark.yml"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python and benchmark deps
        uses: ./.github/actions/setup-python-docpull
        with:
          python-version: "3.11"
          dependency-groups: dev

      - name: Run 10k-page benchmark
        shell: bash
        run: |
          set -o pipefail
          make benchmark-10k | tee benchmark.log

      - name: Surface report in summary
        if: always()
        run: |
          echo "## docpull 10k-page benchmark" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          grep "DOCPULL_10K_BENCHMARK_REPORT=" benchmark.log \
            | sed 's/.*DOCPULL_10K_BENCHMARK_REPORT=//' \
            | python -m json.tool \
            >> "$GITHUB_STEP_SUMMARY" || echo "(no report line found)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-log
          path: benchmark.log
          retention-days: 30
