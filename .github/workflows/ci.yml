name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python ${{ matrix.python-version }}
        uses: ./.github/actions/setup-python-docpull
        with:
          python-version: ${{ matrix.python-version }}
          dependency-groups: all,dev
          enable-cache: "true"

      - name: Run tests with coverage
        run: make test-cov

      - name: Upload coverage XML
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-xml
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: ./.github/actions/setup-python-docpull
        with:
          python-version: "3.11"
          dependency-groups: all,dev
          enable-cache: "true"

      - name: Run lint checks
        run: make lint-check

      - name: Run pre-commit
        run: make pre-commit-check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: ./.github/actions/setup-python-docpull
        with:
          python-version: "3.11"
          dependency-groups: all,dev
          enable-cache: "true"

      - name: Run mypy
        run: make typecheck
