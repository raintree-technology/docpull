# Label PRs based on files changed

documentation:
  - '**/*.md'
  - 'docs/**/*'

tests:
  - 'tests/**/*'
  - '**/*test*.py'

dependencies:
  - 'pyproject.toml'
  - 'requirements*.txt'
  - 'web/package.json'
  - 'web/package-lock.json'
  - 'mcp/package.json'
  - 'mcp/bun.lock'

ci-cd:
  - '.github/workflows/**/*'
  - '.github/actions/**/*'

fetchers:
  - 'src/docpull/core/fetcher.py'
  - 'src/docpull/discovery/_fetch.py'
  - 'src/docpull/http/**/*'
  - 'src/docpull/pipeline/steps/fetch.py'

core:
  - 'src/docpull/**/*.py'
  - '!src/docpull/core/fetcher.py'
  - '!src/docpull/discovery/_fetch.py'
  - '!src/docpull/http/**/*'
  - '!src/docpull/pipeline/steps/fetch.py'
