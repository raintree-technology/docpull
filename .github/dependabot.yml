version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:10"
      timezone: "America/Los_Angeles"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      release-tooling:
        patterns:
          - "build"
          - "pip"
          - "setuptools"
          - "twine"
          - "wheel"
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "types-*"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "types-*"
          - "build"
          - "pip"
          - "setuptools"
          - "twine"
          - "wheel"

  # Web app npm dependencies
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "daily"
      time: "09:20"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "web"
    groups:
      web-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # MCP Bun dependencies
  - package-ecosystem: "bun"
    directory: "/mcp"
    schedule:
      interval: "daily"
      time: "09:30"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "mcp"
    groups:
      mcp-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
