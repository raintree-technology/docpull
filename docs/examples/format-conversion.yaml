# Format conversion examples for docpull 4.x
#
# Supported formats are markdown, json, ndjson, and sqlite.
# CLI equivalents:
#   docpull https://docs.anthropic.com --format json --output-dir ./docs-json
#   docpull https://docs.anthropic.com --profile llm --stream > documents.ndjson
#   docpull https://docs.anthropic.com --format sqlite --output-dir ./docs-db

- profile: rag
  url: https://docs.anthropic.com
  crawl:
    max_pages: 100
    rate_limit: 0.5
  output:
    format: json
    directory: ./docs-json
    rich_metadata: true
  log_level: INFO

- profile: llm
  url: https://docs.anthropic.com
  crawl:
    max_pages: 100
    rate_limit: 0.5
  output:
    format: ndjson
    directory: ./docs-ndjson
    ndjson_filename: documents.ndjson
    max_tokens_per_file: 4000
    emit_chunks: true
    rich_metadata: true
  log_level: INFO

- profile: rag
  url: https://docs.anthropic.com
  crawl:
    max_pages: 100
    rate_limit: 0.5
  output:
    format: sqlite
    directory: ./docs-db
    rich_metadata: true
  log_level: INFO
