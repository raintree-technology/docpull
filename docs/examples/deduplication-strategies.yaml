# Deduplication behavior for docpull 4.x
#
# Current dedup is streaming content-hash deduplication: the first successfully
# saved copy of a duplicate page wins, and later duplicate pages are skipped.
# The old keep_variant strategies were removed with the deprecated 2.x config
# fields.
#
# CLI equivalent:
#   docpull https://aptos.dev --profile rag --streaming-dedup --output-dir ./docs-aptos --include-paths "*/build/guides/*" "*/build/apis/*"

profile: rag
url: https://aptos.dev
crawl:
  max_pages: 300
  rate_limit: 0.5
  include_paths:
    - "*/build/guides/*"
    - "*/build/apis/*"
  exclude_paths:
    - "*/changelog"
    - "*/release-notes"
content_filter:
  streaming_dedup: true
  max_file_size: 200kb
output:
  directory: ./docs-aptos
  format: markdown
  rich_metadata: true
log_level: INFO
