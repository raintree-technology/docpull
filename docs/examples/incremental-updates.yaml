# Incremental update configuration for docpull 4.x
# CLI equivalent:
#   docpull https://docs.anthropic.com --profile mirror --cache --resume --output-dir ./docs/anthropic

profile: mirror
url: https://docs.anthropic.com
crawl:
  max_pages: 500
  rate_limit: 0.5
output:
  directory: ./docs/anthropic
  format: markdown
cache:
  enabled: true
  directory: .docpull-cache
  ttl_days: 30
  skip_unchanged: true
  resume: true
log_level: INFO
