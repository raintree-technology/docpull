repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy runs against the project venv (rather than pre-commit's isolated env)
  # so it sees aiohttp / mcp / bs4 / pydantic from the [all,dev] install. The
  # alternative — listing every runtime + optional dep in additional_dependencies
  # — drifts away from pyproject.toml the moment a dep is added or pinned.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy src
        language: system
        pass_filenames: false
        types: [python]
        verbose: true
